<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online - 2D MMORPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            background: #0a0c15;
            font-family: 'Courier New', 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Пиксельный стиль */
        .pixel-border {
            border: 2px solid #5a4a2e;
            box-shadow: inset 0 0 0 1px #d4b87a;
            background: #2a2418;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #1a2a1a;
            position: relative;
        }

        /* Верхняя панель */
        .top-bar {
            background: #1a140c;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #5a4a2e;
            flex-wrap: wrap;
            gap: 8px;
        }

        .online-info {
            background: #2a2418;
            padding: 4px 12px;
            border-radius: 0;
            font-size: 11px;
            color: #6f9e6f;
            font-family: monospace;
        }

        .player-stats-mini {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #e6d5a8;
        }

        .stat-mini {
            background: #2a2418;
            padding: 4px 12px;
        }

        /* Игровое поле (вид сверху) */
        .game-field {
            flex: 1;
            position: relative;
            background: #2d3a2a;
            overflow: hidden;
            cursor: crosshair;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #3a4a2a;
            cursor: crosshair;
        }

        /* Нижняя панель */
        .bottom-panel {
            background: #1a140c;
            padding: 10px;
            border-top: 3px solid #5a4a2e;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: space-between;
            align-items: center;
        }

        .class-buttons {
            display: flex;
            gap: 6px;
        }

        .class-btn {
            background: #2a2418;
            border: 2px solid #5a4a2e;
            padding: 8px 16px;
            font-family: monospace;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.05s linear;
            color: #d4b87a;
        }

        .class-btn.active {
            background: #4a3a22;
            border-color: #e6b83e;
            color: #ffdd88;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }

        .class-btn:active {
            transform: translateY(1px);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .pixel-btn {
            background: #3a2a1a;
            border: none;
            padding: 8px 16px;
            font-family: monospace;
            font-weight: bold;
            font-size: 12px;
            color: #f5e6b0;
            cursor: pointer;
            border-bottom: 3px solid #7a5a3a;
            text-transform: uppercase;
        }

        .pixel-btn:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Лог боя */
        .battle-log {
            background: #0a0a0a;
            width: 250px;
            height: 200px;
            position: absolute;
            bottom: 80px;
            right: 10px;
            overflow-y: auto;
            font-size: 10px;
            color: #8faa6a;
            padding: 8px;
            border: 2px solid #5a4a2e;
            background: rgba(10,10,10,0.9);
            z-index: 10;
            pointer-events: none;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #2a2a1a;
            font-size: 9px;
        }

        .damage-number {
            position: absolute;
            font-weight: bold;
            font-size: 16px;
            font-family: monospace;
            text-shadow: 1px 1px 0 black;
            pointer-events: none;
            z-index: 20;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        .pvp-indicator {
            background: #8a2a2a;
            color: #ffaa88;
            padding: 2px 8px;
            font-size: 10px;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #2a2418;
            border: 3px solid #d4b87a;
            padding: 20px;
            max-width: 300px;
            width: 90%;
            color: #e6d5a8;
            font-family: monospace;
        }

        .modal-title {
            font-size: 18px;
            text-align: center;
            margin-bottom: 16px;
            color: #ffdd88;
        }

        .close-btn {
            background: #3a2a1a;
            padding: 8px;
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
        }

        .inventory-item {
            background: #1e1a12;
            padding: 6px;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- Верхняя панель -->
    <div class="top-bar">
        <div class="online-info" id="onlineInfo">🟢 ONLINE: 1,234</div>
        <div class="player-stats-mini">
            <div class="stat-mini">❤️ <span id="hpStat">100/100</span></div>
            <div class="stat-mini">⚔️ <span id="dmgStat">25-35</span></div>
            <div class="stat-mini">🛡️ <span id="defStat">15</span></div>
            <div class="stat-mini">✨ Lv.<span id="levelStat">1</span></div>
            <div class="stat-mini">💰 <span id="goldStat">500</span></div>
            <div class="stat-mini">💎 <span id="diamondsStat">0</span></div>
        </div>
        <div class="pvp-indicator" id="pvpIndicator">⚪ МИРНЫЙ</div>
    </div>

    <!-- Игровое поле (вид сверху) -->
    <div class="game-field">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="battle-log" id="battleLog">
            <div class="log-entry">✨ Добро пожаловать в Rucoy Online!</div>
            <div class="log-entry">⚔️ Кликай по врагам, чтобы атаковать</div>
            <div class="log-entry">🏃 Двигай мышкой/пальцем для уклонения</div>
        </div>
    </div>

    <!-- Нижняя панель -->
    <div class="bottom-panel">
        <div class="class-buttons">
            <button class="class-btn" id="classSword">⚔️ МЕЧНИК</button>
            <button class="class-btn" id="classBow">🏹 ЛУЧНИК</button>
            <button class="class-btn" id="classStaff">🔮 МАГ</button>
        </div>
        <div class="action-buttons">
            <button class="pixel-btn" id="pvpToggleBtn">⚔️ PVP РЕЖИМ</button>
            <button class="pixel-btn" id="inventoryBtn">📦 ИНВЕНТАРЬ</button>
            <button class="pixel-btn" id="skillsBtn">📊 НАВЫКИ</button>
            <button class="pixel-btn" id="healBtn">💊 ЛЕЧЕНИЕ (50💰)</button>
        </div>
    </div>
</div>

<!-- Модальные окна -->
<div id="inventoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">📦 ИНВЕНТАРЬ</div>
        <div id="inventoryList"></div>
        <div class="close-btn" onclick="closeModal('inventoryModal')">ЗАКРЫТЬ</div>
    </div>
</div>

<div id="skillsModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">📊 НАВЫКИ</div>
        <div id="skillsList"></div>
        <div class="close-btn" onclick="closeModal('skillsModal')">ЗАКРЫТЬ</div>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Размеры игрового поля
    let canvasWidth = 800;
    let canvasHeight = 500;
    
    function resizeCanvas() {
        const container = document.querySelector('.game-field');
        canvasWidth = container.clientWidth;
        canvasHeight = container.clientHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        drawGame();
    }
    
    window.addEventListener('resize', resizeCanvas);
    
    // ========== ИГРОК ==========
    let player = {
        name: "ГЕРОЙ",
        level: 1,
        exp: 0,
        maxHp: 100,
        hp: 100,
        baseDmg: { min: 25, max: 35 },
        defense: 15,
        gold: 500,
        diamonds: 0,
        x: 400,
        y: 250,
        radius: 20,
        pvpMode: false,
        pvpKills: 0,
        pvpSkirmish: 0,
        
        // Навыки (скиллы)
        skillSword: 1,
        skillBow: 1,
        skillStaff: 1,
        skillDefense: 1,
        
        // Текущий класс
        currentClass: "sword", // sword, bow, staff
        classEmoji: { sword: "⚔️", bow: "🏹", staff: "🔮" },
        
        // Экипировка
        weapon: null,
        armor: null
    };
    
    // ========== МОНСТРЫ ==========
    let monsters = [];
    let monsterId = 0;
    
    const monsterTypes = [
        { name: "🐀 КРЫСА", emoji: "🐀", level: 1, hp: 50, minDmg: 8, maxDmg: 15, exp: 15, gold: 20, defense: 2, color: "#8a6a4a" },
        { name: "🐺 ВОЛК", emoji: "🐺", level: 3, hp: 120, minDmg: 15, maxDmg: 25, exp: 35, gold: 45, defense: 5, color: "#6a6a5a" },
        { name: "🧟 ЗОМБИ", emoji: "🧟", level: 5, hp: 200, minDmg: 20, maxDmg: 35, exp: 60, gold: 80, defense: 8, color: "#5a6a4a" },
        { name: "👹 ОРК", emoji: "👹", level: 8, hp: 350, minDmg: 28, maxDmg: 48, exp: 100, gold: 120, defense: 12, color: "#6a4a3a" },
        { name: "🐉 ДРАКОН", emoji: "🐉", level: 16, hp: 900, minDmg: 55, maxDmg: 85, exp: 300, gold: 350, defense: 25, color: "#8a4a2a" }
    ];
    
    // ========== ИГРОКИ ДЛЯ PVP ==========
    let otherPlayers = [];
    
    // ========== ФУНКЦИИ ==========
    function getRandomDamage(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
    }
    
    function getPlayerDamage() {
        let baseMin = player.baseDmg.min;
        let baseMax = player.baseDmg.max;
        
        // Бонус от навыка
        let skillBonus = 1;
        if (player.currentClass === "sword") skillBonus = 1 + (player.skillSword - 1) * 0.05;
        if (player.currentClass === "bow") skillBonus = 1 + (player.skillBow - 1) * 0.05;
        if (player.currentClass === "staff") skillBonus = 1 + (player.skillStaff - 1) * 0.05;
        
        let min = Math.floor(baseMin * skillBonus);
        let max = Math.floor(baseMax * skillBonus);
        
        return getRandomDamage(min, max);
    }
    
    function getPlayerDefense() {
        let defBonus = 1 + (player.skillDefense - 1) * 0.03;
        return Math.floor(player.defense * defBonus);
    }
    
    function attackMonster(monster, mouseX, mouseY) {
        // Проверка расстояния
        let dx = player.x - monster.x;
        let dy = player.y - monster.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        
        let attackRange = 50;
        if (player.currentClass === "bow") attackRange = 120;
        if (player.currentClass === "staff") attackRange = 110;
        
        if (distance > attackRange) {
            addLog(`❌ Слишком далеко! Подойдите ближе к ${monster.name}`);
            return;
        }
        
        // Урон игрока
        let damage = getPlayerDamage();
        let isCrit = Math.random() < 0.1;
        if (isCrit) damage = Math.floor(damage * 1.8);
        
        let finalDamage = Math.max(1, damage - monster.defense);
        monster.hp -= finalDamage;
        
        // Показываем урон
        showDamageNumber(mouseX, mouseY, finalDamage, isCrit);
        addLog(`⚔️ Вы нанесли ${finalDamage} урона ${monster.name}${isCrit ? ' [КРИТ]' : ''}`);
        
        // Проверка на смерть
        if (monster.hp <= 0) {
            addLog(`🎉 Победа над ${monster.name}! +${monster.exp} EXP, +${monster.gold}💰`);
            player.exp += monster.exp;
            player.gold += monster.gold;
            
            // Прокачка навыка
            if (player.currentClass === "sword") player.skillSword = Math.min(100, player.skillSword + 1);
            if (player.currentClass === "bow") player.skillBow = Math.min(100, player.skillBow + 1);
            if (player.currentClass === "staff") player.skillStaff = Math.min(100, player.skillStaff + 1);
            player.skillDefense = Math.min(100, player.skillDefense + 0.5);
            
            checkLevelUp();
            
            // Удаляем монстра
            const index = monsters.indexOf(monster);
            if (index > -1) monsters.splice(index, 1);
            
            // Спавн нового
            spawnMonster();
            updateUI();
            return true;
        }
        
        // Контратака монстра
        let monsterDamage = getRandomDamage(monster.minDmg, monster.maxDmg);
        let playerDef = getPlayerDefense();
        let reducedDamage = Math.max(1, monsterDamage - playerDef);
        player.hp -= reducedDamage;
        
        showDamageNumber(monster.x, monster.y - 20, reducedDamage, false, true);
        addLog(`😈 ${monster.name} наносит ${reducedDamage} урона!`);
        
        if (player.hp <= 0) {
            player.hp = 0;
            addLog(`💀 ВЫ ПОГИБЛИ! Возрождение... -50💰`);
            player.gold = Math.max(0, player.gold - 50);
            player.hp = player.maxHp;
            // Возрождение в центре
            player.x = canvasWidth / 2;
            player.y = canvasHeight / 2;
        }
        
        updateUI();
        return true;
    }
    
    function showDamageNumber(x, y, damage, isCrit, isMonsterAttack = false) {
        const damageDiv = document.createElement('div');
        damageDiv.className = 'damage-number';
        damageDiv.textContent = `-${damage}`;
        if (isCrit) damageDiv.style.color = '#ffaa44';
        if (isMonsterAttack) damageDiv.style.color = '#ff8866';
        damageDiv.style.left = (x - 15) + 'px';
        damageDiv.style.top = (y - 20) + 'px';
        damageDiv.style.position = 'absolute';
        damageDiv.style.pointerEvents = 'none';
        document.querySelector('.game-field').appendChild(damageDiv);
        setTimeout(() => damageDiv.remove(), 600);
    }
    
    function attackPlayer(targetPlayer, mouseX, mouseY) {
        if (!player.pvpMode && !targetPlayer.pvpMode) {
            addLog(`❌ ${targetPlayer.name} в мирном режиме!`);
            return;
        }
        
        let dx = player.x - targetPlayer.x;
        let dy = player.y - targetPlayer.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance > 50) {
            addLog(`❌ Слишком далеко для PvP!`);
            return;
        }
        
        let damage = getPlayerDamage();
        targetPlayer.hp -= damage;
        
        showDamageNumber(mouseX, mouseY, damage, false);
        addLog(`⚔️ PVP: Вы нанесли ${damage} урона ${targetPlayer.name}`);
        
        if (targetPlayer.hp <= 0) {
            addLog(`💀 ${targetPlayer.name} повержен! +50💰 +1 убийство`);
            player.gold += 50;
            player.pvpKills++;
            
            if (!targetPlayer.pvpMode) {
                player.pvpSkirmish++;
                addLog(`⚠️ СКВЕРНА +1! Ваше имя окрашено в красный!`);
                updatePvpIndicator();
            }
            
            // Удаляем игрока
            const index = otherPlayers.indexOf(targetPlayer);
            if (index > -1) otherPlayers.splice(index, 1);
        }
        
        updateUI();
    }
    
    function heal() {
        if (player.gold < 50) {
            addLog(`❌ Недостаточно золота! Нужно 50💰`);
            return;
        }
        if (player.hp >= player.maxHp) {
            addLog(`❤️ У вас полное здоровье!`);
            return;
        }
        player.gold -= 50;
        player.hp = player.maxHp;
        addLog(`💊 Вы использовали зелье! Здоровье восстановлено`);
        updateUI();
    }
    
    function checkLevelUp() {
        let expNeeded = player.level * 100;
        while (player.exp >= expNeeded) {
            player.exp -= expNeeded;
            player.level++;
            player.maxHp += 20;
            player.hp = player.maxHp;
            player.baseDmg.min += 5;
            player.baseDmg.max += 5;
            player.defense += 3;
            addLog(`✨✨✨ УРОВЕНЬ ПОВЫШЕН! Теперь вы ${player.level} уровень! ✨✨✨`);
            expNeeded = player.level * 100;
        }
        updateUI();
    }
    
    function spawnMonster() {
        if (monsters.length >= 8) return;
        
        let levelRange = Math.max(1, player.level - 3);
        let available = monsterTypes.filter(m => m.level <= player.level + 5);
        if (available.length === 0) available = monsterTypes;
        
        let type = available[Math.floor(Math.random() * available.length)];
        
        let monster = {
            id: monsterId++,
            name: type.name,
            emoji: type.emoji,
            level: type.level,
            hp: type.hp,
            maxHp: type.hp,
            minDmg: type.minDmg,
            maxDmg: type.maxDmg,
            exp: type.exp,
            gold: type.gold,
            defense: type.defense,
            color: type.color,
            x: Math.random() * (canvasWidth - 60) + 30,
            y: Math.random() * (canvasHeight - 60) + 30,
            radius: 25
        };
        
        monsters.push(monster);
    }
    
    function spawnPlayer() {
        let newPlayer = {
            id: "player_" + Math.random(),
            name: "Игрок_" + Math.floor(Math.random() * 1000),
            level: Math.floor(Math.random() * player.level) + 1,
            hp: 100,
            maxHp: 100,
            pvpMode: Math.random() < 0.3,
            x: Math.random() * (canvasWidth - 60) + 30,
            y: Math.random() * (canvasHeight - 60) + 30,
            radius: 20,
            color: "#6a8a4a"
        };
        otherPlayers.push(newPlayer);
    }
    
    // ========== РИСОВАНИЕ ==========
    function drawGame() {
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        
        // Сетка (трава)
        ctx.fillStyle = "#3a5a2a";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        for (let i = 0; i < canvasWidth; i += 40) {
            ctx.beginPath();
            ctx.strokeStyle = "#5a7a4a";
            ctx.lineWidth = 1;
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvasHeight);
            ctx.stroke();
            ctx.moveTo(0, i);
            ctx.lineTo(canvasWidth, i);
            ctx.stroke();
        }
        
        // Другие игроки
        otherPlayers.forEach(p => {
            ctx.fillStyle = p.pvpMode ? "#aa4444" : p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 12px monospace";
            ctx.shadowBlur = 0;
            ctx.fillText(p.name, p.x - 25, p.y - 15);
            ctx.fillStyle = "#ffaa66";
            ctx.fillText(`Lv.${p.level}`, p.x - 15, p.y - 2);
            
            // HP Bar
            let hpPercent = p.hp / p.maxHp;
            ctx.fillStyle = "#331a0a";
            ctx.fillRect(p.x - 25, p.y - 25, 50, 6);
            ctx.fillStyle = "#c44";
            ctx.fillRect(p.x - 25, p.y - 25, 50 * hpPercent, 6);
            
            ctx.fillStyle = p.pvpMode ? "#ff8888" : "#88aa88";
            ctx.font = "10px monospace";
            ctx.fillText(p.pvpMode ? "🔴 PVP" : "⚪ МИР", p.x - 15, p.y + 25);
        });
        
        // Монстры
        monsters.forEach(m => {
            ctx.fillStyle = m.color;
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 14px monospace";
            ctx.fillText(m.emoji, m.x - 10, m.y - 5);
            ctx.font = "10px monospace";
            ctx.fillStyle = "#ffaa66";
            ctx.fillText(m.name, m.x - 20, m.y - 18);
            
            // HP Bar
            let hpPercent = m.hp / m.maxHp;
            ctx.fillStyle = "#331a0a";
            ctx.fillRect(m.x - 30, m.y - 30, 60, 6);
            ctx.fillStyle = "#c44";
            ctx.fillRect(m.x - 30, m.y - 30, 60 * hpPercent, 6);
            
            ctx.fillStyle = "#aaaa77";
            ctx.font = "9px monospace";
            ctx.fillText(`Lv.${m.level}`, m.x - 10, m.y + 25);
        });
        
        // Игрок
        let playerColor = player.pvpMode ? "#cc5533" : "#4a8a4a";
        ctx.fillStyle = playerColor;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 14px monospace";
        ctx.fillText(player.classEmoji[player.currentClass], player.x - 8, player.y - 8);
        ctx.font = "bold 12px monospace";
        ctx.fillText(player.name, player.x - 25, player.y - 20);
        
        // HP Bar игрока
        let hpPercent = player.hp / player.maxHp;
        ctx.fillStyle = "#331a0a";
        ctx.fillRect(player.x - 30, player.y - 35, 60, 8);
        ctx.fillStyle = "#44aa44";
        ctx.fillRect(player.x - 30, player.y - 35, 60 * hpPercent, 8);
        
        if (player.pvpSkirmish > 0) {
            ctx.fillStyle = "#ff6666";
            ctx.font = "bold 10px monospace";
            ctx.fillText(`СКВЕРНА: ${player.pvpSkirmish}`, player.x - 30, player.y - 45);
        }
        
        // Радиус атаки
        let attackRange = player.currentClass === "sword" ? 50 : (player.currentClass === "bow" ? 120 : 110);
        ctx.beginPath();
        ctx.arc(player.x, player.y, attackRange, 0, Math.PI * 2);
        ctx.strokeStyle = "#ffdd88";
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    
    // ========== ОБРАБОТЧИКИ ==========
    let lastClickTime = 0;
    
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        let mouseX = (clientX - rect.left) * scaleX;
        let mouseY = (clientY - rect.top) * scaleY;
        
        // Движение игрока
        let dx = mouseX - player.x;
        let dy = mouseY - player.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if (distance > 5) {
            let speed = 5;
            player.x += (dx / distance) * speed;
            player.y += (dy / distance) * speed;
        }
        
        // Проверка границ
        player.x = Math.min(Math.max(player.x, 30), canvasWidth - 30);
        player.y = Math.min(Math.max(player.y, 30), canvasHeight - 30);
        
        // Проверка клика по монстру (атака)
        let now = Date.now();
        if (now - lastClickTime < 300) return;
        lastClickTime = now;
        
        let hit = false;
        for (let i = monsters.length - 1; i >= 0; i--) {
            let m = monsters[i];
            let dxm = mouseX - m.x;
            let dym = mouseY - m.y;
            if (Math.sqrt(dxm * dxm + dym * dym) <= m.radius + 10) {
                attackMonster(m, mouseX, mouseY);
                hit = true;
                break;
            }
        }
        
        if (!hit) {
            for (let p of otherPlayers) {
                let dxp = mouseX - p.x;
                let dyp = mouseY - p.y;
                if (Math.sqrt(dxp * dxp + dyp * dyp) <= p.radius + 10) {
                    attackPlayer(p, mouseX, mouseY);
                    hit = true;
                    break;
                }
            }
        }
        
        drawGame();
        updateUI();
    }
    
    function changeClass(className) {
        player.currentClass = className;
        document.getElementById('classSword').classList.remove('active');
        document.getElementById('classBow').classList.remove('active');
        document.getElementById('classStaff').classList.remove('active');
        document.getElementById(`class${className.charAt(0).toUpperCase() + className.slice(1)}`).classList.add('active');
        addLog(`⚔️ Вы сменили класс на ${className === 'sword' ? 'МЕЧНИК' : className === 'bow' ? 'ЛУЧНИК' : 'МАГ'}`);
        drawGame();
    }
    
    function togglePvP() {
        player.pvpMode = !player.pvpMode;
        updatePvpIndicator();
        addLog(player.pvpMode ? "🔴 Включен PVP режим! Будьте осторожны!" : "⚪ Выключен PVP режим");
        drawGame();
    }
    
    function updatePvpIndicator() {
        const indicator = document.getElementById('pvpIndicator');
        if (player.pvpSkirmish > 0) {
            indicator.innerHTML = `🔴 СКВЕРНА: ${player.pvpSkirmish}`;
            indicator.style.background = "#8a2a2a";
        } else if (player.pvpMode) {
            indicator.innerHTML = "🔴 PVP РЕЖИМ";
            indicator.style.background = "#6a2a2a";
        } else {
            indicator.innerHTML = "⚪ МИРНЫЙ";
            indicator.style.background = "#2a5a2a";
        }
    }
    
    function updateUI() {
        document.getElementById('hpStat').innerHTML = `${player.hp}/${player.maxHp}`;
        document.getElementById('dmgStat').innerHTML = `${player.baseDmg.min}-${player.baseDmg.max}`;
        document.getElementById('defStat').innerHTML = getPlayerDefense();
        document.getElementById('levelStat').innerHTML = player.level;
        document.getElementById('goldStat').innerHTML = player.gold;
        document.getElementById('diamondsStat').innerHTML = player.diamonds;
    }
    
    function showInventory() {
        const list = document.getElementById('inventoryList');
        list.innerHTML = `
            <div class="inventory-item">⚔️ Мечник: ${player.skillSword} ур.</div>
            <div class="inventory-item">🏹 Лучник: ${player.skillBow} ур.</div>
            <div class="inventory-item">🔮 Маг: ${player.skillStaff} ур.</div>
            <div class="inventory-item">🛡️ Защита: ${player.skillDefense} ур.</div>
            <div class="inventory-item">💰 Золото: ${player.gold}</div>
            <div class="inventory-item">💎 Алмазы: ${player.diamonds}</div>
            <div class="inventory-item">⚔️ PVP убийств: ${player.pvpKills}</div>
            <div class="inventory-item">⚠️ Скверна: ${player.pvpSkirmish}</div>
        `;
        document.getElementById('inventoryModal').style.display = 'flex';
    }
    
    function showSkills() {
        const list = document.getElementById('skillsList');
        let totalSkill = player.skillSword + player.skillBow + player.skillStaff + player.skillDefense;
        list.innerHTML = `
            <div class="inventory-item">⚔️ Мечник: ${player.skillSword} ур. (+${Math.floor((player.skillSword - 1) * 5)}% урона)</div>
            <div class="inventory-item">🏹 Лучник: ${player.skillBow} ур. (+${Math.floor((player.skillBow - 1) * 5)}% урона)</div>
            <div class="inventory-item">🔮 Маг: ${player.skillStaff} ур. (+${Math.floor((player.skillStaff - 1) * 5)}% урона)</div>
            <div class="inventory-item">🛡️ Защита: ${player.skillDefense} ур. (+${Math.floor((player.skillDefense - 1) * 3)}% защиты)</div>
            <div class="inventory-item">📊 Общий уровень навыков: ${Math.floor(totalSkill / 4)}</div>
            <div class="inventory-item">💡 Совет: Используйте оружие, чтобы прокачивать навык!</div>
        `;
        document.getElementById('skillsModal').style.display = 'flex';
    }
    
    function addLog(message) {
        const logArea = document.getElementById('battleLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = message;
        logArea.appendChild(entry);
        logArea.scrollTop = logArea.scrollHeight;
        while (logArea.children.length > 50) {
            logArea.removeChild(logArea.firstChild);
        }
    }
    
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    
    // ========== ОНЛАЙН СИМУЛЯЦИЯ ==========
    let onlineCount = 1339;
    function updateOnlineCount() {
        onlineCount += Math.floor(Math.random() * 10) - 5;
        onlineCount = Math.max(500, Math.min(5000, onlineCount));
        document.getElementById('onlineInfo').innerHTML = `🟢 ONLINE: ${onlineCount.toLocaleString()}`;
        setTimeout(updateOnlineCount, 30000);
    }
    
    function simulateOtherPlayers() {
        setInterval(() => {
            if (otherPlayers.length < 5 && Math.random() < 0.3) {
                spawnPlayer();
            }
            if (otherPlayers.length > 10) {
                otherPlayers = otherPlayers.slice(0, 10);
            }
            drawGame();
        }, 10000);
    }
    
    // Анимация движения
    function gameLoop() {
        drawGame();
        requestAnimationFrame(gameLoop);
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        resizeCanvas();
        
        // Спавн монстров
        for (let i = 0; i < 5; i++) spawnMonster();
        
        // Спавн других игроков
        for (let i = 0; i < 3; i++) spawnPlayer();
        
        // Обработчики
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleCanvasClick(e);
        });
        
        document.getElementById('classSword').addEventListener('click', () => changeClass('sword'));
        document.getElementById('classBow').addEventListener('click', () => changeClass('bow'));
        document.getElementById('classStaff').addEventListener('click', () => changeClass('staff'));
        document.getElementById('pvpToggleBtn').addEventListener('click', togglePvP);
        document.getElementById('inventoryBtn').addEventListener('click', showInventory);
        document.getElementById('skillsBtn').addEventListener('click', showSkills);
        document.getElementById('healBtn').addEventListener('click', heal);
        
        // Класс по умолчанию
        document.getElementById('classSword').classList.add('active');
        
        updateUI();
        updateOnlineCount();
        simulateOtherPlayers();
        gameLoop();
        
        addLog("🎮 Добро пожаловать в Rucoy Online!");
        addLog("👆 Кликай по врагам, чтобы атаковать");
        addLog("🏃 Двигай мышкой/пальцем для уклонения");
        addLog("⚔️ Смени класс кнопками внизу");
        addLog("🔴 Включи PVP для сражений с другими игроками");
    }
    
    init();
</script>
</body>
</html>
