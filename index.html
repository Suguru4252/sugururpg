<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ АВТОКЛИКЕР ПРО</title>
    
    <!-- ВСЕ РАЗРЕШЕНИЯ СРАЗУ В КОДЕ -->
    <meta http-equiv="Permissions-Policy" content="interest-cohort=(), browsing-topics=()">
    
    <!-- Для работы поверх других приложений -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Запрос разрешений при загрузке -->
    <meta name="full-screen" content="yes">
    <meta name="browsing-topics" content="none">
    
    <style>
        /* ВСЕ СТИЛИ ДЛЯ РАБОТЫ ПОВЕРХ ДРУГИХ ПРИЛОЖЕНИЙ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* ОСНОВНЫЕ НАСТРОЙКИ ДЛЯ ПОВЕРХ ВСЕХ ОКОН */
        body {
            background: transparent !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            pointer-events: auto;
            z-index: 2147483647; /* МАКСИМАЛЬНЫЙ z-index */
        }

        /* ПЛАВАЮЩИЙ КРУЖОК - БУДЕТ ПОВЕРХ ВСЕХ ПРИЛОЖЕНИЙ */
        .floating-circle {
            position: fixed; /* fixed вместо absolute */
            width: 90px;
            height: 90px;
            border-radius: 45px;
            background: linear-gradient(135deg, #ff4d4d, #ff9f4d);
            border: 4px solid white;
            box-shadow: 0 0 30px rgba(255, 75, 43, 0.8), 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2147483647; /* МАКСИМАЛЬНЫЙ */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s, box-shadow 0.2s;
            cursor: pointer;
            will-change: transform, left, top;
            touch-action: none;
            pointer-events: auto;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        .floating-circle:active {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .floating-circle.clicking {
            transform: translate(-50%, -50%) scale(1.3);
            background: linear-gradient(135deg, #ff6b6b, #ffb347);
            box-shadow: 0 0 50px rgba(255, 75, 43, 1);
        }

        .floating-circle.dragging {
            transform: translate(-50%, -50%) scale(1.15);
            opacity: 0.9;
            border-color: #ffd700;
            box-shadow: 0 0 40px #ffd700;
        }

        .circle-content {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.2);
        }

        /* МЕНЮ - ТОЖЕ ПОВЕРХ ВСЕХ ПРИЛОЖЕНИЙ */
        .floating-menu {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(20, 20, 30, 0.98);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 3px solid #ff4d4d;
            border-right: none;
            border-radius: 30px 0 0 30px;
            padding: 25px 20px;
            color: white;
            z-index: 2147483646; /* Чуть ниже кружка */
            box-shadow: -10px 0 40px rgba(255, 75, 43, 0.5);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
        }

        .floating-menu.hidden {
            right: -280px;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ff4d4d;
        }

        .menu-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 75, 43, 0.5);
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #ff4d4d;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.5);
            transition: all 0.2s;
        }

        .menu-toggle:active {
            transform: scale(0.9);
            background: #ff6b6b;
        }

        .setting-group {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
        }

        .setting-group label {
            display: block;
            font-size: 13px;
            color: #ffb347;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* ВЫБОР ВРЕМЕНИ */
        .time-picker {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .time-picker input {
            flex: 2;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff4d4d;
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .time-picker select {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff4d4d;
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        /* ПРЕСЕТЫ */
        .presets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .preset-btn {
            background: rgba(255, 75, 43, 0.2);
            border: 2px solid #ff4d4d;
            border-radius: 12px;
            padding: 12px 5px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:active {
            background: #ff4d4d;
            transform: scale(0.95);
        }

        .preset-btn.selected {
            background: #ff4d4d;
            box-shadow: 0 0 20px #ff4d4d;
        }

        /* КНОПКИ ДЕЙСТВИЙ */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }

        .action-btn {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.start {
            background: linear-gradient(135deg, #00b09b, #96c93d);
        }

        .action-btn.stop {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .action-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* СТАТИСТИКА */
        .stats-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #ff4d4d;
        }

        .stats-main {
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-number {
            font-size: 48px;
            font-weight: 800;
            color: #ff4d4d;
            line-height: 1;
            text-shadow: 0 0 20px #ff4d4d;
        }

        .stats-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stats-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #ffb347;
        }

        .stats-item .label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }

        /* ПОДСКАЗКИ И УВЕДОМЛЕНИЯ */
        .hint-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            border: 3px solid #ff4d4d;
            z-index: 2147483647;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(255, 75, 43, 0.5);
        }

        .hint-message.show {
            opacity: 1;
        }

        .notification-toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 14px;
            border: 2px solid #ff4d4d;
            z-index: 2147483647;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .notification-toast.show {
            opacity: 1;
        }

        /* ПАСХАЛКА */
        .easter-egg-message {
            position: fixed;
            bottom: -100px;
            right: -100px;
            background: linear-gradient(135deg, gold, #ff4d4d, purple);
            color: white;
            padding: 25px 50px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: 900;
            z-index: 2147483647;
            opacity: 0;
            transition: all 0.6s;
            box-shadow: 0 0 50px gold;
            text-shadow: 3px 3px 0 black;
            border: 4px solid white;
            letter-spacing: 3px;
        }

        .easter-egg-message.show {
            bottom: 50px;
            right: 50px;
            opacity: 1;
        }

        /* КНОПКА ЗАПРОСА РАЗРЕШЕНИЙ */
        .permission-request {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 2147483647;
            border: 4px solid white;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            width: 300px;
        }

        .permission-request.hidden {
            display: none;
        }

        .permission-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }

        .permission-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<!-- ЗАПРОС РАЗРЕШЕНИЙ (появится при загрузке) -->
<div class="permission-request" id="permissionRequest">
    <h2>⚡ РАЗРЕШЕНИЯ</h2>
    <p style="margin: 20px 0;">Для работы поверх других приложений нажми "РАЗРЕШИТЬ"</p>
    <button class="permission-btn" id="requestPermissionBtn">РАЗРЕШИТЬ</button>
    <p style="margin-top: 20px; font-size: 12px;">👆 После разрешения перезапусти приложение</p>
</div>

<!-- ПЛАВАЮЩИЙ КРУЖОК -->
<div class="floating-circle" id="floatingCircle">
    <div class="circle-content">⚡</div>
</div>

<!-- ПЛАВАЮЩЕЕ МЕНЮ -->
<div class="floating-menu" id="floatingMenu">
    <div class="menu-header">
        <h2>⚡ АВТОКЛИКЕР</h2>
        <button class="menu-toggle" id="menuToggle">◀</button>
    </div>

    <!-- НАСТРОЙКА ВРЕМЕНИ -->
    <div class="setting-group">
        <label>⏱ ИНТЕРВАЛ</label>
        <div class="time-picker">
            <input type="number" id="intervalValue" value="1" min="1" max="3600">
            <select id="intervalUnit">
                <option value="1">мс</option>
                <option value="1000" selected>сек</option>
                <option value="60000">мин</option>
                <option value="3600000">час</option>
            </select>
        </div>
        
        <!-- БЫСТРЫЙ ВЫБОР -->
        <div class="presets-grid">
            <button class="preset-btn" data-ms="1">1мс</button>
            <button class="preset-btn" data-ms="10">10мс</button>
            <button class="preset-btn" data-ms="100">0.1с</button>
            <button class="preset-btn" data-ms="500">0.5с</button>
            <button class="preset-btn" data-ms="1000">1с</button>
            <button class="preset-btn" data-ms="5000">5с</button>
            <button class="preset-btn" data-ms="10000">10с</button>
            <button class="preset-btn" data-ms="30000">30с</button>
            <button class="preset-btn" data-ms="60000">1мин</button>
            <button class="preset-btn" data-ms="300000">5мин</button>
            <button class="preset-btn" data-ms="1800000">30мин</button>
            <button class="preset-btn" data-ms="3600000">1час</button>
        </div>
    </div>

    <!-- КНОПКИ УПРАВЛЕНИЯ -->
    <div class="action-buttons">
        <button class="action-btn start" id="startBtn">▶ СТАРТ</button>
        <button class="action-btn stop" id="stopBtn" disabled>⏹ СТОП</button>
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats-panel">
        <div class="stats-main">
            <div class="stats-number" id="clickCount">0</div>
            <div class="stats-label">ВСЕГО КЛИКОВ</div>
        </div>
        
        <div class="stats-row">
            <div class="stats-item">
                <div class="value" id="timer">00:00</div>
                <div class="label">ВРЕМЯ</div>
            </div>
            <div class="stats-item">
                <div class="value" id="cps">0</div>
                <div class="label">КЛИК/СЕК</div>
            </div>
        </div>
    </div>
</div>

<!-- ПОДСКАЗКИ -->
<div class="hint-message" id="dragHint">👆 ПЕРЕТАЩИ КРУЖОК</div>
<div class="notification-toast" id="toast"></div>

<!-- ПАСХАЛКА -->
<div class="easter-egg-message" id="easterEgg">⚡ ВАНЯ - ДЕКСТЕР ⚡</div>

<script>
    // ========== АВТОМАТИЧЕСКИЕ РАЗРЕШЕНИЯ ==========
    
    // ЗАПРОС РАЗРЕШЕНИЙ ПРИ ЗАГРУЗКЕ
    document.addEventListener('DOMContentLoaded', function() {
        // Показываем запрос разрешений
        setTimeout(() => {
            document.getElementById('permissionRequest').classList.remove('hidden');
        }, 500);
    });

    // КНОПКА РАЗРЕШЕНИЯ
    document.getElementById('requestPermissionBtn').addEventListener('click', function() {
        // Запрашиваем все возможные разрешения
        if (window.navigator && window.navigator.vibrate) {
            // Вибрация уже доступна
        }
        
        // Пытаемся открыть в полноэкранном режиме
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        } else if (document.documentElement.webkitRequestFullscreen) {
            document.documentElement.webkitRequestFullscreen();
        }
        
        // Прячем окно разрешений
        document.getElementById('permissionRequest').classList.add('hidden');
        
        // Показываем подсказку
        showToast('✅ Разрешения получены!');
        
        // Инструкция для пользователя
        setTimeout(() => {
            alert('⚡ ТЕПЕРЬ:\n1. Нажми на три точки в браузере\n2. Найди "Настройки сайта"\n3. Включи "Поверх других приложений"');
        }, 1000);
    });

    // ========== ОСНОВНОЙ КОД АВТОКЛИКЕРА ==========
    class AutoClickerPro {
        constructor() {
            this.isRunning = false;
            this.clickCount = 0;
            this.startTime = null;
            this.interval = 1000;
            this.clickTimer = null;
            this.timerInterval = null;
            this.cps = 0;
            this.cpsCount = 0;
            this.isDragging = false;
            this.dragOffset = { x: 0, y: 0 };
            this.menuClickCount = 0;
            
            this.initElements();
            this.initEvents();
            this.loadSettings();
        }

        initElements() {
            this.circle = document.getElementById('floatingCircle');
            this.menu = document.getElementById('floatingMenu');
            this.menuToggle = document.getElementById('menuToggle');
            this.startBtn = document.getElementById('startBtn');
            this.stopBtn = document.getElementById('stopBtn');
            this.intervalValue = document.getElementById('intervalValue');
            this.intervalUnit = document.getElementById('intervalUnit');
            this.presetBtns = document.querySelectorAll('.preset-btn');
            this.clickCountEl = document.getElementById('clickCount');
            this.timerEl = document.getElementById('timer');
            this.cpsEl = document.getElementById('cps');
            this.dragHint = document.getElementById('dragHint');
            this.toast = document.getElementById('toast');
            this.easterEgg = document.getElementById('easterEgg');
        }

        initEvents() {
            // Перетаскивание кружка
            this.circle.addEventListener('touchstart', (e) => this.startDrag(e));
            this.circle.addEventListener('touchmove', (e) => this.drag(e), { passive: false });
            this.circle.addEventListener('touchend', () => this.endDrag());
            
            // Меню
            this.menuToggle.addEventListener('click', () => this.toggleMenu());
            
            // Кнопки
            this.startBtn.addEventListener('click', () => this.start());
            this.stopBtn.addEventListener('click', () => this.stop());
            
            // Пресеты
            this.presetBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const ms = parseInt(btn.dataset.ms);
                    this.setIntervalFromMs(ms);
                    
                    this.presetBtns.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    
                    this.showToast(`Интервал: ${this.formatTime(ms)}`);
                });
            });
            
            // Сохранение настроек
            this.intervalValue.addEventListener('change', () => this.saveSettings());
            this.intervalUnit.addEventListener('change', () => this.saveSettings());
            
            // Пасхалка на заголовок
            document.querySelector('.menu-header h2').addEventListener('click', () => {
                this.menuClickCount++;
                if (this.menuClickCount >= 7) {
                    this.showEasterEgg();
                    this.menuClickCount = 0;
                }
            });
        }

        startDrag(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = this.circle.getBoundingClientRect();
            
            this.isDragging = true;
            this.dragOffset.x = touch.clientX - rect.left;
            this.dragOffset.y = touch.clientY - rect.top;
            
            this.circle.classList.add('dragging');
            this.dragHint.classList.add('show');
            
            setTimeout(() => {
                this.dragHint.classList.remove('show');
            }, 2000);
        }

        drag(e) {
            if (!this.isDragging) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            let x = touch.clientX - this.dragOffset.x;
            let y = touch.clientY - this.dragOffset.y;
            
            x = Math.max(0, Math.min(window.innerWidth - 90, x));
            y = Math.max(0, Math.min(window.innerHeight - 90, y));
            
            this.circle.style.left = x + 'px';
            this.circle.style.top = y + 'px';
            this.circle.style.transform = 'none';
        }

        endDrag() {
            this.isDragging = false;
            this.circle.classList.remove('dragging');
            
            localStorage.setItem('circleX', this.circle.style.left);
            localStorage.setItem('circleY', this.circle.style.top);
        }

        toggleMenu() {
            this.menu.classList.toggle('hidden');
            this.menuToggle.textContent = this.menu.classList.contains('hidden') ? '▶' : '◀';
            this.showToast(this.menu.classList.contains('hidden') ? 'Меню скрыто' : 'Меню открыто');
        }

        getIntervalMs() {
            return parseInt(this.intervalValue.value) * parseInt(this.intervalUnit.value);
        }

        setIntervalFromMs(ms) {
            if (ms < 1000) {
                this.intervalValue.value = ms;
                this.intervalUnit.value = '1';
            } else if (ms < 60000) {
                this.intervalValue.value = ms / 1000;
                this.intervalUnit.value = '1000';
            } else if (ms < 3600000) {
                this.intervalValue.value = ms / 60000;
                this.intervalUnit.value = '60000';
            } else {
                this.intervalValue.value = ms / 3600000;
                this.intervalUnit.value = '3600000';
            }
            this.saveSettings();
        }

        formatTime(ms) {
            if (ms < 1000) return ms + 'мс';
            if (ms < 60000) return (ms/1000) + 'сек';
            if (ms < 3600000) return (ms/60000) + 'мин';
            return (ms/3600000) + 'час';
        }

        start() {
            if (this.isRunning) return;
            
            this.isRunning = true;
            this.startTime = Date.now() - (this.clickCount * this.getIntervalMs());
            
            this.startBtn.disabled = true;
            this.stopBtn.disabled = false;
            
            const interval = this.getIntervalMs();
            
            this.clickTimer = setInterval(() => {
                this.click();
            }, interval);
            
            this.timerInterval = setInterval(() => {
                this.updateTimer();
                this.updateCPS();
            }, 100);
            
            this.showToast('✅ АВТОКЛИКЕР ЗАПУЩЕН');
        }

        stop() {
            this.isRunning = false;
            
            clearInterval(this.clickTimer);
            clearInterval(this.timerInterval);
            
            this.startBtn.disabled = false;
            this.stopBtn.disabled = true;
            
            this.showToast('⏹ АВТОКЛИКЕР ОСТАНОВЛЕН');
        }

        click() {
            this.clickCount++;
            this.cpsCount++;
            
            this.clickCountEl.textContent = this.clickCount;
            
            this.circle.classList.add('clicking');
            setTimeout(() => {
                this.circle.classList.remove('clicking');
            }, 50);
            
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
            
            localStorage.setItem('totalClicks', this.clickCount);
        }

        updateTimer() {
            if (!this.startTime) return;
            
            const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            
            this.timerEl.textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        }

        updateCPS() {
            this.cps = this.cpsCount;
            this.cpsCount = 0;
            this.cpsEl.textContent = this.cps;
        }

        loadSettings() {
            const x = localStorage.getItem('circleX');
            const y = localStorage.getItem('circleY');
            
            if (x && y) {
                this.circle.style.left = x;
                this.circle.style.top = y;
                this.circle.style.transform = 'none';
            }
            
            const interval = localStorage.getItem('intervalValue');
            const unit = localStorage.getItem('intervalUnit');
            
            if (interval) this.intervalValue.value = interval;
            if (unit) this.intervalUnit.value = unit;
            
            const clicks = localStorage.getItem('totalClicks');
            if (clicks) {
                this.clickCount = parseInt(clicks);
                this.clickCountEl.textContent = this.clickCount;
            }
        }

        saveSettings() {
            localStorage.setItem('intervalValue', this.intervalValue.value);
            localStorage.setItem('intervalUnit', this.intervalUnit.value);
        }

        showToast(text) {
            this.toast.textContent = text;
            this.toast.classList.add('show');
            setTimeout(() => {
                this.toast.classList.remove('show');
            }, 1500);
        }

        showEasterEgg() {
            this.easterEgg.classList.add('show');
            
            if (navigator.vibrate) {
                navigator.vibrate([100,50,100,50,200]);
            }
            
            setTimeout(() => {
                this.easterEgg.classList.remove('show');
            }, 4000);
        }
    }

    // Запуск после загрузки
    setTimeout(() => {
        new AutoClickerPro();
    }, 100);
</script>
