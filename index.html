<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rucoy Online - Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0c12;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .left-buttons {
            position: fixed;
            bottom: 20px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }
        .v-btn {
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa55;
            border-radius: 50%;
            color: #ffcc88;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .v-btn:active { transform: scale(0.95); }
        .super-btn { background: rgba(200,100,50,0.9); }
        .hp-btn { background: rgba(180,60,60,0.9); }
        .mp-btn { background: rgba(60,80,180,0.9); }
        .right-buttons {
            position: fixed;
            bottom: 20px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        .class-btn {
            width: 55px;
            height: 55px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa55;
            border-radius: 50%;
            color: #ffcc88;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .class-btn:active { transform: scale(0.95); }
        .corner-btn {
            position: fixed;
            top: 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa55;
            color: #ffcc88;
            font-size: 18px;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
        }
        .stats-btn { right: 15px; }
        .inventory-btn { left: 15px; }
        .pc-hint {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ffcc88;
            z-index: 100;
            white-space: nowrap;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .v-btn { width: 50px; height: 50px; font-size: 24px; }
            .class-btn { width: 45px; height: 45px; font-size: 20px; }
            .corner-btn { font-size: 14px; padding: 6px 12px; }
            .pc-hint { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="left-buttons">
        <button class="v-btn super-btn" id="superBtn">🌟</button>
        <button class="v-btn hp-btn" id="hpBtn">❤️</button>
        <button class="v-btn mp-btn" id="mpBtn">💙</button>
    </div>
    <div class="right-buttons">
        <button class="class-btn" id="classWarriorBtn">⚔️</button>
        <button class="class-btn" id="classArcherBtn">🏹</button>
        <button class="class-btn" id="classMageBtn">🔮</button>
    </div>
    <button class="corner-btn stats-btn" id="statsBtn">📊</button>
    <button class="corner-btn inventory-btn" id="inventoryBtn">🎒</button>
    <div class="pc-hint">⌨️ 1 - СУПЕР | 2 - HP | 3 - MP</div>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Размеры
    const TILE = 50;
    const MAP_W = 120;
    const MAP_H = 90;
    const WORLD_W = MAP_W * TILE;
    const WORLD_H = MAP_H * TILE;
    
    let cameraX = 0, cameraY = 0;
    let canvasW, canvasH;
    
    function resize() {
        canvasW = window.innerWidth;
        canvasH = window.innerHeight;
        canvas.width = canvasW;
        canvas.height = canvasH;
    }
    window.addEventListener('resize', resize);
    resize();
    
    // Карта
    let map = Array(MAP_H).fill().map(() => Array(MAP_W).fill(0));
    // 0=трава, 1=безопасная зона, 2=ворота, 3=дерево, 4=гора, 5=вода, 6=камень
    
    function generateMap() {
        for(let y = 0; y < MAP_H; y++) {
            for(let x = 0; x < MAP_W; x++) {
                map[y][x] = 0;
            }
        }
        // Безопасная зона
        for(let y = 12; y < 24; y++) {
            for(let x = 14; x < 30; x++) {
                map[y][x] = 1;
            }
        }
        // Ворота
        for(let x = 19; x < 25; x++) { map[11][x] = 2; map[24][x] = 2; }
        for(let y = 16; y < 22; y++) { map[y][13] = 2; map[y][30] = 2; }
        // Деревья
        for(let i = 0; i < 350; i++) {
            let x = 2 + Math.random() * (MAP_W - 4);
            let y = 2 + Math.random() * (MAP_H - 4);
            if(map[y][x] === 0 && !(y > 11 && y < 25 && x > 13 && x < 31)) {
                map[y][x] = 3;
            }
        }
        // Горы
        for(let i = 0; i < 70; i++) {
            let x = 2 + Math.random() * (MAP_W - 4);
            let y = 2 + Math.random() * (MAP_H - 4);
            if(map[y][x] === 0 && !(y > 11 && y < 25 && x > 13 && x < 31)) {
                map[y][x] = 4;
            }
        }
        // Вода
        for(let i = 0; i < 12; i++) {
            let sx = 10 + Math.random() * (MAP_W - 20);
            let sy = 8 + Math.random() * (MAP_H - 16);
            let ang = Math.random() * Math.PI * 2;
            let len = 12 + Math.random() * 20;
            for(let s = 0; s < len; s++) {
                let x = sx + Math.floor(Math.cos(ang) * s);
                let y = sy + Math.floor(Math.sin(ang) * s);
                if(x > 1 && x < MAP_W-1 && y > 1 && y < MAP_H-1 && map[y][x] === 0) {
                    map[y][x] = 5;
                }
            }
        }
        // Камни
        for(let i = 0; i < 180; i++) {
            let x = 1 + Math.random() * (MAP_W - 2);
            let y = 1 + Math.random() * (MAP_H - 2);
            if(map[y][x] === 0 && !(y > 11 && y < 25 && x > 13 && x < 31)) {
                map[y][x] = 6;
            }
        }
    }
    
    function isWalkable(tx, ty) {
        if(tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
        let t = map[ty][tx];
        return t !== 3 && t !== 4 && t !== 5 && t !== 6;
    }
    
    function isInSafe(tx, ty) {
        return map[ty] && map[ty][tx] === 1;
    }
    
    function isGate(tx, ty) {
        return map[ty] && map[ty][tx] === 2;
    }
    
    // A* поиск пути
    function findPath(sx, sy, tx, ty) {
        let start = { x: Math.floor(sx / TILE), y: Math.floor(sy / TILE) };
        let target = { x: Math.floor(tx / TILE), y: Math.floor(ty / TILE) };
        if(!isWalkable(target.x, target.y)) return [];
        if(start.x === target.x && start.y === target.y) return [];
        
        let open = [start];
        let cameFrom = new Map();
        let g = new Map();
        let f = new Map();
        g.set(`${start.x},${start.y}`, 0);
        f.set(`${start.x},${start.y}`, Math.abs(start.x - target.x) + Math.abs(start.y - target.y));
        
        while(open.length) {
            let current = open.reduce((a,b) => (f.get(`${a.x},${a.y}`) || 9999) < (f.get(`${b.x},${b.y}`) || 9999) ? a : b);
            if(current.x === target.x && current.y === target.y) {
                let path = [];
                let cur = current;
                while(cameFrom.has(`${cur.x},${cur.y}`)) {
                    path.unshift({ x: cur.x * TILE + TILE/2, y: cur.y * TILE + TILE/2 });
                    cur = cameFrom.get(`${cur.x},${cur.y}`);
                }
                path.push({ x: target.x * TILE + TILE/2, y: target.y * TILE + TILE/2 });
                return path;
            }
            open = open.filter(p => !(p.x === current.x && p.y === current.y));
            let neighbors = [
                { x: current.x+1, y: current.y }, { x: current.x-1, y: current.y },
                { x: current.x, y: current.y+1 }, { x: current.x, y: current.y-1 }
            ];
            for(let n of neighbors) {
                if(!isWalkable(n.x, n.y)) continue;
                let tentG = (g.get(`${current.x},${current.y}`) || 0) + 1;
                if(tentG < (g.get(`${n.x},${n.y}`) || 9999)) {
                    cameFrom.set(`${n.x},${n.y}`, { x: current.x, y: current.y });
                    g.set(`${n.x},${n.y}`, tentG);
                    f.set(`${n.x},${n.y}`, tentG + Math.abs(n.x - target.x) + Math.abs(n.y - target.y));
                    if(!open.some(p => p.x === n.x && p.y === n.y)) open.push(n);
                }
            }
        }
        return [];
    }
    
    // Данные
    const CLASSES = {
        warrior: { name: "Мечник", icon: "⚔️", color: "#6c8cae", hp: 450, mp: 100, crit: 12, dodge: 6 },
        archer: { name: "Лучник", icon: "🏹", color: "#7cae6c", hp: 360, mp: 170, crit: 18, dodge: 12 },
        mage: { name: "Маг", icon: "🔮", color: "#b57ad6", hp: 300, mp: 300, crit: 15, dodge: 9 }
    };
    
    const ARMORS = [
        { id: "cloth", name: "Тканевая", def: 4, level: 1, price: 100 },
        { id: "leather", name: "Кожаная", def: 10, level: 3, price: 300 },
        { id: "iron", name: "Железная", def: 18, level: 6, price: 800 },
        { id: "dragon", name: "Драконья", def: 40, level: 15, price: 4000 }
    ];
    
    const WEAPONS = [
        { id: "dagger", name: "Кинжал", dmgMin: 8, dmgMax: 14, level: 1, price: 80, range: 55 },
        { id: "sword", name: "Меч", dmgMin: 14, dmgMax: 26, level: 3, price: 250, range: 60 },
        { id: "bow", name: "Лук", dmgMin: 16, dmgMax: 30, level: 3, price: 300, range: 150 },
        { id: "staff", name: "Посох", dmgMin: 18, dmgMax: 34, level: 4, price: 400, range: 140 }
    ];
    
    const MOBS = [
        { name: "Гоблин", hp: 80, dmg: 22, exp: 45, color: "#6f8c5a", icon: "👺", speed: 1.0, range: 60, levelMin: 1, gold: 30 },
        { name: "Тролль", hp: 150, dmg: 32, exp: 78, color: "#7a6a4a", icon: "👹", speed: 0.75, range: 65, levelMin: 2, gold: 55 },
        { name: "Скелет", hp: 200, dmg: 40, exp: 110, color: "#b8b8cc", icon: "💀", speed: 1.1, range: 60, levelMin: 3, gold: 80 },
        { name: "Орк", hp: 280, dmg: 54, exp: 155, color: "#8a6a4a", icon: "👺", speed: 0.85, range: 65, levelMin: 4, gold: 110 },
        { name: "Дракон", hp: 400, dmg: 72, exp: 250, color: "#c97a3a", icon: "🐉", speed: 0.6, range: 70, levelMin: 6, gold: 180 }
    ];
    
    // Игрок
    let player = {
        x: 21 * TILE, y: 18 * TILE,
        targetX: null, targetY: null, path: [],
        hp: 450, maxHp: 450,
        mp: 100, maxMp: 100,
        level: 1, exp: 0, expNext: 120,
        classType: "warrior",
        gold: 500,
        armorId: "cloth",
        weaponId: "sword",
        attackTimer: 0,
        superTimer: 0
    };
    
    function getArmor() { return ARMORS.find(a => a.id === player.armorId); }
    function getWeapon() { return WEAPONS.find(w => w.id === player.weaponId); }
    
    function updateStats() {
        let armor = getArmor();
        let weapon = getWeapon();
        let cls = CLASSES[player.classType];
        player.maxHp = cls.hp + player.level * 15;
        player.maxMp = cls.mp + player.level * 12;
        if(player.hp > player.maxHp) player.hp = player.maxHp;
        if(player.mp > player.maxMp) player.mp = player.maxMp;
        player.defense = armor.def + Math.floor(player.level * 1.2);
        player.critChance = cls.crit + Math.floor(player.level * 0.5);
        player.dodgeChance = cls.dodge + Math.floor(player.level * 0.4);
    }
    
    function getDamage() {
        let w = getWeapon();
        let min = w.dmgMin + Math.floor(player.level * 2);
        let max = w.dmgMax + Math.floor(player.level * 2.8);
        return { min, max };
    }
    
    function getRange() { return getWeapon().range; }
    
    // Мобы
    let mobs = [];
    let spawnTimer = 0;
    let maxMobs = 35;
    
    function createMob() {
        let avail = MOBS.filter(m => player.level >= m.levelMin);
        if(avail.length === 0) avail = MOBS;
        let t = avail[Math.floor(Math.random() * avail.length)];
        let lvl = Math.max(1, player.level + Math.floor(Math.random() * 4) - 2);
        let mult = 1 + (lvl - 1) * 0.15;
        return {
            name: t.name + " Lv." + lvl,
            level: lvl,
            hp: Math.floor(t.hp * mult),
            maxHp: Math.floor(t.hp * mult),
            dmg: Math.floor(t.dmg * (1 + (lvl-1)*0.12)),
            exp: Math.floor(t.exp * (0.8 + lvl*0.1)),
            gold: Math.floor(t.gold * (0.8 + lvl*0.1)),
            color: t.color,
            icon: t.icon,
            speed: t.speed,
            range: t.range,
            x: 0, y: 0,
            attackTimer: 0
        };
    }
    
    function spawnMob() {
        if(mobs.length >= maxMobs) return;
        for(let i = 0; i < 50; i++) {
            let tx = 5 + Math.random() * (MAP_W - 10);
            let ty = 5 + Math.random() * (MAP_H - 10);
            if(isWalkable(tx, ty) && !isInSafe(tx, ty)) {
                let m = createMob();
                m.x = tx * TILE + TILE/2;
                m.y = ty * TILE + TILE/2;
                mobs.push(m);
                return;
            }
        }
    }
    
    // Перемещение
    function moveTo(x, y) {
        player.targetX = x;
        player.targetY = y;
        player.path = findPath(player.x, player.y, x, y);
    }
    
    function updateMove() {
        if(!player.path || player.path.length === 0) return;
        let next = player.path[0];
        let dx = next.x - player.x;
        let dy = next.y - player.y;
        let dist = Math.hypot(dx, dy);
        if(dist < 6) {
            player.path.shift();
        } else {
            let step = Math.min(4.2, dist);
            let ang = Math.atan2(dy, dx);
            let nx = player.x + Math.cos(ang) * step;
            let ny = player.y + Math.sin(ang) * step;
            let tx = Math.floor(nx / TILE);
            let ty = Math.floor(ny / TILE);
            let oldTx = Math.floor(player.x / TILE);
            let oldTy = Math.floor(player.y / TILE);
            let can = isWalkable(tx, ty);
            let gateOk = (isInSafe(tx, ty) === isInSafe(oldTx, oldTy)) || isGate(tx, ty) || isGate(oldTx, oldTy);
            if(can && gateOk) {
                player.x = nx;
                player.y = ny;
            } else {
                player.path = [];
            }
        }
    }
    
    // Бой
    let selectedMob = null;
    let messages = [];
    let damageNumbers = [];
    let showStats = false;
    let showInv = false;
    let shopOpen = false;
    let bankOpen = false;
    let explosionMode = false;
    let whirlwindActive = false;
    let whirlwindTimer = 0;
    
    function addMsg(t, err = false) {
        messages.unshift({ text: t, err: err, life: 200 });
        if(messages.length > 6) messages.pop();
    }
    
    function showDamage(x, y, dmg, isPlayer = false, isCrit = false) {
        damageNumbers.push({ x, y, dmg, life: 20, isPlayer, isCrit });
    }
    
    function killMob(mob) {
        let expGain = mob.exp;
        let goldGain = Math.floor(mob.gold);
        player.exp += expGain;
        player.gold += goldGain;
        addMsg("✨ +" + expGain + " опыта, +" + goldGain + "💰");
        if(Math.random() < 0.3) {
            if(Math.random() < 0.6) player.potionHp = (player.potionHp || 5) + 1;
            else player.potionMp = (player.potionMp || 5) + 1;
            addMsg("🧪 Выпало зелье!");
        }
        let idx = mobs.indexOf(mob);
        if(idx !== -1) mobs.splice(idx, 1);
        if(selectedMob === mob) selectedMob = null;
        
        while(player.exp >= player.expNext) {
            player.exp -= player.expNext;
            player.level++;
            updateStats();
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            player.expNext = 120 + player.level * 45;
            addMsg("⭐⭐⭐ УРОВЕНЬ " + player.level + "! ⭐⭐⭐");
        }
    }
    
    function attack() {
        if(!selectedMob || selectedMob.hp <= 0) {
            selectedMob = null;
            return false;
        }
        if(player.attackTimer > 0) return false;
        let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
        let range = getRange();
        if(dist > range) {
            addMsg("🏃 Слишком далеко! (" + Math.floor(dist) + "/" + range + "px)", true);
            return false;
        }
        let dmgRange = getDamage();
        let dmg = Math.floor(Math.random() * (dmgRange.max - dmgRange.min + 1) + dmgRange.min);
        let isCrit = Math.random() * 100 < player.critChance;
        if(isCrit) {
            dmg = Math.floor(dmg * 1.8);
        }
        selectedMob.hp -= dmg;
        player.attackTimer = 28;
        let cls = CLASSES[player.classType];
        addMsg("⚔️ " + cls.name + " → " + dmg + " урона " + selectedMob.name + (isCrit ? " (КРИТ!)" : ""));
        showDamage(selectedMob.x, selectedMob.y, dmg, false, isCrit);
        if(selectedMob.hp <= 0) killMob(selectedMob);
        return true;
    }
    
    function useSuper() {
        if(player.superTimer > 0) {
            addMsg("🌟 Суперспособность: " + Math.ceil(player.superTimer/10) + " сек", true);
            return;
        }
        let cls = CLASSES[player.classType];
        if(cls.name === "Мечник") {
            whirlwindActive = true;
            whirlwindTimer = 30;
            player.superTimer = 180;
            addMsg("🌀 ВИХРЬ! Урон x2 по всем врагам!");
            for(let mob of mobs) {
                let dist = Math.hypot(player.x - mob.x, player.y - mob.y);
                if(dist < 100 && mob.hp > 0) {
                    let dmgRange = getDamage();
                    let avg = (dmgRange.min + dmgRange.max) / 2;
                    let dmg = Math.floor(avg * 2);
                    mob.hp -= dmg;
                    showDamage(mob.x, mob.y, dmg, false, true);
                    addMsg("🌀 Вихрь → " + dmg + " урона " + mob.name);
                    if(mob.hp <= 0) killMob(mob);
                }
            }
        } else if(cls.name === "Лучник") {
            let targets = mobs.filter(m => m.hp > 0 && Math.hypot(player.x - m.x, player.y - m.y) < 200);
            targets.sort((a,b) => Math.hypot(player.x - a.x, player.y - a.y) - Math.hypot(player.x - b.x, player.y - b.y));
            let hit = 0;
            for(let mob of targets.slice(0, 3)) {
                let dmgRange = getDamage();
                let avg = (dmgRange.min + dmgRange.max) / 2;
                let dmg = Math.floor(avg * 3);
                mob.hp -= dmg;
                showDamage(mob.x, mob.y, dmg, false, true);
                addMsg("🏹 Тройной выстрел → " + dmg + " урона " + mob.name);
                if(mob.hp <= 0) killMob(mob);
                hit++;
            }
            if(hit > 0) player.superTimer = 180;
            else addMsg("🏹 Нет врагов поблизости!", true);
        } else if(cls.name === "Маг") {
            addMsg("🔥 Нажмите на любое место для взрыва!");
            explosionMode = true;
            return;
        }
    }
    
    function castExplosion(wx, wy) {
        if(!explosionMode) return;
        explosionMode = false;
        let dmgRange = getDamage();
        let avg = (dmgRange.min + dmgRange.max) / 2;
        let dmg = Math.floor(avg * 2.5);
        let hit = false;
        for(let mob of mobs) {
            let dist = Math.hypot(wx - mob.x, wy - mob.y);
            if(dist < 90 && mob.hp > 0) {
                mob.hp -= dmg;
                showDamage(mob.x, mob.y, dmg, false, true);
                addMsg("🔥 Взрыв → " + dmg + " урона " + mob.name);
                if(mob.hp <= 0) killMob(mob);
                hit = true;
            }
        }
        damageNumbers.push({ x: wx, y: wy, dmg: "💥", life: 20, isExplosion: true });
        if(!hit) addMsg("🔥 Взрыв не задел врагов!", true);
        player.superTimer = 180;
    }
    
    // Мобы атакуют
    function updateMobs() {
        for(let m of mobs) {
            if(m.hp <= 0) continue;
            let dx = player.x - m.x;
            let dy = player.y - m.y;
            let dist = Math.hypot(dx, dy);
            if(dist < 240 && !isInSafe(Math.floor(player.x/TILE), Math.floor(player.y/TILE))) {
                let ang = Math.atan2(dy, dx);
                let step = Math.min(m.speed, dist - 45);
                if(step > 0) {
                    let nx = m.x + Math.cos(ang) * step;
                    let ny = m.y + Math.sin(ang) * step;
                    let tx = Math.floor(nx / TILE);
                    let ty = Math.floor(ny / TILE);
                    if(isWalkable(tx, ty) && !isInSafe(tx, ty)) {
                        m.x = nx;
                        m.y = ny;
                    }
                }
                if(dist < m.range + 18) {
                    if(m.attackTimer <= 0) {
                        let dodge = Math.random() * 100 < player.dodgeChance;
                        if(dodge) {
                            addMsg("✨ УВОРОТ! " + m.name + " промахнулся!", false);
                            m.attackTimer = 30;
                            continue;
                        }
                        let dmg = Math.max(5, m.dmg - Math.floor(player.defense / 4));
                        player.hp -= dmg;
                        m.attackTimer = 30;
                        addMsg("💀 " + m.name + " нанес " + dmg + " урона!", true);
                        showDamage(m.x, m.y, dmg, true);
                        if(player.hp <= 0) {
                            player.hp = player.maxHp;
                            player.mp = player.maxMp;
                            player.x = 21 * TILE;
                            player.y = 18 * TILE;
                            player.path = [];
                            addMsg("💀 ВОСКРЕШЕНИЕ В БЕЗОПАСНОЙ ЗОНЕ 💀", true);
                        }
                    } else {
                        m.attackTimer--;
                    }
                } else if(m.attackTimer > 0) {
                    m.attackTimer--;
                }
            } else if(m.attackTimer > 0) {
                m.attackTimer--;
            }
        }
    }
    
    // Зелья
    player.potionHp = 5;
    player.potionMp = 5;
    
    function useHp() {
        let tx = Math.floor(player.x / TILE);
        let ty = Math.floor(player.y / TILE);
        if(!isInSafe(tx, ty)) {
            addMsg("🏪 Зелья только в безопасной зоне!", true);
            return;
        }
        if(player.potionHp <= 0) {
            addMsg("❌ Нет зелий HP! Купите у торговца", true);
            return;
        }
        let heal = Math.floor(player.maxHp * 0.65);
        player.hp = Math.min(player.maxHp, player.hp + heal);
        player.potionHp--;
        addMsg("❤️ +" + heal + " HP (осталось " + player.potionHp + ")");
    }
    
    function useMp() {
        let tx = Math.floor(player.x / TILE);
        let ty = Math.floor(player.y / TILE);
        if(!isInSafe(tx, ty)) {
            addMsg("🏪 Зелья только в безопасной зоне!", true);
            return;
        }
        if(player.potionMp <= 0) {
            addMsg("❌ Нет зелий MP! Купите у торговца", true);
            return;
        }
        let mana = Math.floor(player.maxMp * 0.7);
        player.mp = Math.min(player.maxMp, player.mp + mana);
        player.potionMp--;
        addMsg("💙 +" + mana + " MP (осталось " + player.potionMp + ")");
    }
    
    // NPC
    let npcs = [
        { x: 27 * TILE, y: 22 * TILE, name: "Торговец", icon: "🏪", action: "shop" },
        { x: 17 * TILE, y: 22 * TILE, name: "Лекарь", icon: "💚", action: "heal" },
        { x: 22 * TILE, y: 13 * TILE, name: "Банкир", icon: "🏦", action: "bank" }
    ];
    
    function healFromNPC() {
        let tx = Math.floor(player.x / TILE);
        let ty = Math.floor(player.y / TILE);
        if(isInSafe(tx, ty)) {
            let cost = Math.floor(player.maxHp * 0.4);
            if(player.gold >= cost) {
                player.gold -= cost;
                player.hp = player.maxHp;
                player.mp = player.maxMp;
                addMsg("💚 Полное восстановление! -" + cost + "💰");
            } else {
                addMsg("💰 Не хватает золота! Нужно " + cost, true);
            }
        } else {
            addMsg("💚 Подойдите к лекарю!", true);
        }
    }
    
    function openShop() {
        let tx = Math.floor(player.x / TILE);
        let ty = Math.floor(player.y / TILE);
        if(isInSafe(tx, ty)) {
            shopOpen = !shopOpen;
            addMsg(shopOpen ? "🏪 Магазин открыт" : "🏪 Магазин закрыт");
        } else {
            addMsg("🏪 Подойдите к торговцу!", true);
        }
    }
    
    function openBank() {
        let tx = Math.floor(player.x / TILE);
        let ty = Math.floor(player.y / TILE);
        if(isInSafe(tx, ty)) {
            bankOpen = !bankOpen;
            addMsg(bankOpen ? "🏦 Банк открыт" : "🏦 Банк закрыт");
        } else {
            addMsg("🏦 Подойдите к банкиру!", true);
        }
    }
    
    function buyItem(item) {
        if(player.gold >= item.price) {
            player.gold -= item.price;
            if(item.type === "hp") player.potionHp++;
            else if(item.type === "mp") player.potionMp++;
            else if(item.type === "armor") {
                player.armorId = item.id;
                updateStats();
            } else if(item.type === "weapon") {
                player.weaponId = item.id;
                updateStats();
            }
            addMsg("✅ Куплен " + item.name + "!");
        } else {
            addMsg("💰 Не хватает золота!", true);
        }
    }
    
    function switchClass(className) {
        if(player.classType === className) return;
        let hpPercent = player.hp / player.maxHp;
        let mpPercent = player.mp / player.maxMp;
        player.classType = className;
        updateStats();
        player.hp = Math.floor(player.maxHp * hpPercent);
        player.mp = Math.floor(player.maxMp * mpPercent);
        if(player.hp <= 0) player.hp = player.maxHp;
        if(player.mp <= 0) player.mp = player.maxMp;
        addMsg("🔄 Класс: " + CLASSES[className].name + " " + CLASSES[className].icon);
    }
    
    // Взаимодействие
    function checkNPC(wx, wy) {
        for(let npc of npcs) {
            let dist = Math.hypot(wx - npc.x, wy - npc.y);
            if(dist < 35) {
                if(npc.action === "shop") openShop();
                if(npc.action === "heal") healFromNPC();
                if(npc.action === "bank") openBank();
                return true;
            }
        }
        return false;
    }
    
    function selectMob(wx, wy) {
        for(let m of mobs) {
            let dist = Math.hypot(m.x - wx, m.y - wy);
            if(dist < 60 && m.hp > 0) {
                selectedMob = m;
                addMsg("🎯 Цель: " + m.name + " (" + m.hp + "/" + m.maxHp + " HP)");
                return true;
            }
        }
        return false;
    }
    
    function handleClick(wx, wy) {
        if(showStats || showInv) {
            showStats = false;
            showInv = false;
            return;
        }
        if(shopOpen) {
            let items = [
                { name: "Зелье HP", type: "hp", price: 50, icon: "❤️" },
                { name: "Зелье MP", type: "mp", price: 45, icon: "💙" },
                ...ARMORS.map(a => ({ ...a, type: "armor" })),
                ...WEAPONS.map(w => ({ ...w, type: "weapon" }))
            ];
            let startY = canvasH/2 - 150;
            for(let i = 0; i < items.length; i++) {
                let y = startY + i * 50;
                if(wy > cameraY + y - 20 && wy < cameraY + y + 35) {
                    buyItem(items[i]);
                    return;
                }
            }
            shopOpen = false;
            return;
        }
        if(bankOpen) {
            let y1 = canvasH/2 - 30;
            let y2 = canvasH/2 + 30;
            if(wy > cameraY + y1 - 20 && wy < cameraY + y1 + 50) {
                let amount = Math.min(player.gold, 200);
                if(amount > 0) {
                    player.gold -= amount;
                    player.bankGold = (player.bankGold || 0) + amount;
                    addMsg("🏦 Внесено " + amount + "💰");
                }
                return;
            }
            if(wy > cameraY + y2 - 20 && wy < cameraY + y2 + 50) {
                let amount = Math.min(player.bankGold || 0, 200);
                if(amount > 0) {
                    player.bankGold -= amount;
                    player.gold += amount;
                    addMsg("🏦 Снято " + amount + "💰");
                }
                return;
            }
            bankOpen = false;
            return;
        }
        if(explosionMode) {
            castExplosion(wx, wy);
            return;
        }
        if(checkNPC(wx, wy)) return;
        if(selectMob(wx, wy)) return;
        moveTo(wx, wy);
    }
    
    // Камера
    function updateCamera() {
        let tx = player.x - canvasW/2;
        let ty = player.y - canvasH/2;
        tx = Math.min(Math.max(tx, 0), WORLD_W - canvasW);
        ty = Math.min(Math.max(ty, 0), WORLD_H - canvasH);
        cameraX += (tx - cameraX) * 0.1;
        cameraY += (ty - cameraY) * 0.1;
    }
    
    // Отрисовка
    function drawWorld() {
        for(let y = 0; y < MAP_H; y++) {
            for(let x = 0; x < MAP_W; x++) {
                let sx = x * TILE - cameraX;
                let sy = y * TILE - cameraY;
                if(sx > -TILE && sx < canvasW + TILE && sy > -TILE && sy < canvasH + TILE) {
                    let t = map[y][x];
                    if(t === 0) {
                        ctx.fillStyle = ((x+y)%2 === 0) ? "#4a8c3a" : "#3a6c2a";
                        ctx.fillRect(sx, sy, TILE-1, TILE-1);
                    } else if(t === 1) {
                        ctx.fillStyle = "#88aa66";
                        ctx.fillRect(sx, sy, TILE-1, TILE-1);
                    } else if(t === 2) {
                        ctx.fillStyle = "#c9a87a";
                        ctx.fillRect(sx, sy, TILE-1, TILE-1);
                    } else if(t === 3) {
                        ctx.fillStyle = "#3c9e3c";
                        ctx.fillRect(sx+8, sy+12, 34, 34);
                        ctx.fillStyle = "#8b5a2b";
                        ctx.fillRect(sx+20, sy+35, 10, 12);
                    } else if(t === 4) {
                        ctx.fillStyle = "#6e6e7a";
                        ctx.beginPath();
                        ctx.moveTo(sx+25, sy+10);
                        ctx.lineTo(sx+10, sy+40);
                        ctx.lineTo(sx+40, sy+40);
                        ctx.fill();
                    } else if(t === 5) {
                        ctx.fillStyle = "#3a8cbb";
                        ctx.fillRect(sx, sy, TILE-1, TILE-1);
                        ctx.fillStyle = "#5ac8ff";
                        for(let i=0;i<3;i++) ctx.fillRect(sx+12+i*12, sy+22, 6, 6);
                    } else if(t === 6) {
                        ctx.fillStyle = "#7a6a5a";
                        ctx.beginPath();
                        ctx.ellipse(sx+25, sy+25, 12, 10, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }
        }
        for(let npc of npcs) {
            let nx = npc.x - cameraX;
            let ny = npc.y - cameraY;
            ctx.fillStyle = "#c99e6f";
            ctx.fillRect(nx-18, ny-24, 36, 48);
            ctx.fillStyle = "#e8c28a";
            ctx.fillRect(nx-12, ny-16, 24, 32);
            ctx.fillStyle = "#000";
            ctx.fillRect(nx-8, ny-10, 5, 5);
            ctx.fillRect(nx+3, ny-10, 5, 5);
            ctx.font = "26px monospace";
            ctx.fillStyle = "#ffdd99";
            ctx.fillText(npc.icon, nx-12, ny+2);
            ctx.font = "9px monospace";
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(npc.name, nx-20, ny-28);
        }
    }
    
    function drawPlayer() {
        let x = player.x - cameraX;
        let y = player.y - cameraY;
        let cls = CLASSES[player.classType];
        ctx.fillStyle = "#e0c8a0";
        ctx.fillRect(x-16, y-26, 32, 52);

    function drawMob(m) {

        if(shopOpen) {

    // Статистика
    let statsStart = Date.now();
    let statsMobs = 0;
    let statsGold = 0;
    let statsDamage = 0;
    let statsDamageTaken = 0;
    
    function updateStatsVars() {
        statsMobs = mobsKilledCount;
        statsGold = totalGoldCount;
        statsDamage = totalDamageCount;
        statsDamageTaken = totalDamageTakenCount;
    }
    
    let mobsKilledCount = 0;
    let totalGoldCount = 0;
    let totalDamageCount = 0;
    let totalDamageTakenCount = 0;
    
    // Перехват killMob для статистики
    let originalKill = killMob;
    killMob = function(mob) {
        mobsKilledCount++;
        totalGoldCount += mob.gold;
        originalKill(mob);
        updateStatsVars();
    };
    
    let originalAttack = attack;
    attack = function() {
        let dmgRange = getDamage();
        let dmg = Math.floor(Math.random() * (dmgRange.max - dmgRange.min + 1) + dmgRange.min);
        totalDamageCount += dmg;
        return originalAttack();
    };
    
    let originalDamage = function(dmg) {
        totalDamageTakenCount += dmg;
    };
    
    // Обновление
    function update() {
        updateMove();
        updateMobs();
        updateCamera();
        if(player.attackTimer > 0) player.attackTimer--;
        if(player.superTimer > 0) player.superTimer--;
        if(spawnTimer <= 0) {
            if(mobs.length < maxMobs) spawnMob();
            spawnTimer = 20;
        } else {
            spawnTimer--;
        }
        for(let i=0;i<messages.length;i++) {
            if(messages[i].life) messages[i].life--;
        }
        messages = messages.filter(m => m.life === undefined || m.life > 0);
    }
    
    // Управление
    function getWorldClick(cx, cy) {
        let rect = canvas.getBoundingClientRect();
        let sx = canvasW / rect.width;
        let sy = canvasH / rect.height;
        let x = (cx - rect.left) * sx + cameraX;
        let y = (cy - rect.top) * sy + cameraY;
        return { x, y };
    }
    
    canvas.addEventListener('click', (e) => {
        let w = getWorldClick(e.clientX, e.clientY);
        handleClick(w.x, w.y);
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        let t = e.touches[0];
        let w = getWorldClick(t.clientX, t.clientY);
        handleClick(w.x, w.y);
    });
    
    setInterval(() => {
        if(selectedMob && selectedMob.hp > 0) {
            let dist = Math.hypot(player.x - selectedMob.x, player.y - selectedMob.y);
            if(dist <= getRange() + 20) attack();
        }
    }, 2000);
    
    document.getElementById('superBtn').onclick = () => useSuper();
    document.getElementById('hpBtn').onclick = () => useHp();
    document.getElementById('mpBtn').onclick = () => useMp();
    document.getElementById('statsBtn').onclick = () => { showStats = !showStats; showInv = false; updateStatsVars(); };
    document.getElementById('inventoryBtn').onclick = () => { showInv = !showInv; showStats = false; };
    document.getElementById('classWarriorBtn').onclick = () => switchClass('warrior');
    document.getElementById('classArcherBtn').onclick = () => switchClass('archer');
    document.getElementById('classMageBtn').onclick = () => switchClass('mage');
    
    window.addEventListener('keydown', (e) => {
        if(e.key === '1') useSuper();
        if(e.key === '2') useHp();
        if(e.key === '3') useMp();
        if(e.key === 'c') {
            let classes = ['warrior', 'archer', 'mage'];
            let idx = classes.indexOf(player.classType);
            switchClass(classes[(idx+1)%3]);
        }
    });
    
    // Инициализация
    generateMap();
    updateStats();
    player.hp = player.maxHp;
    player.mp = player.maxMp;
    for(let i=0;i<15;i++) spawnMob();
    addMsg("✨ ДОБРО ПОЖАЛОВАТЬ! ✨");
    addMsg("🗡️ Нажмите на моба → автоатака раз в 2 сек");
    addMsg("🌟 1 - СУПЕРСИЛА | 2 - ЗЕЛЬЕ HP | 3 - ЗЕЛЬЕ MP");
    addMsg("🏪 NPC: Торговец 🏪 | Лекарь 💚 | Банкир 🏦");
    
    function render() {
        drawWorld();
        for(let m of mobs) drawMob(m);
        drawPlayer();
        drawUI();
    }
    
    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
})();
</script>
</body>
</html>
