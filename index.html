<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile AutoClicker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Плавающее меню (всегда сверху) -->
    <div class="floating-menu" id="floatingMenu">
        <div class="menu-header">
            <div class="menu-title">
                <span class="menu-icon">⚡</span>
                <span>AutoClicker</span>
            </div>
            <div class="menu-controls">
                <button class="menu-btn" id="toggleMenuBtn">−</button>
            </div>
        </div>
        
        <div class="menu-content" id="menuContent">
            <!-- Скорость кликов -->
            <div class="control-group">
                <label>Скорость кликов</label>
                <div class="speed-control">
                    <button class="speed-btn" id="speedDown">−</button>
                    <span class="speed-value" id="speedValue">10</span>
                    <span class="speed-unit">/сек</span>
                    <button class="speed-btn" id="speedUp">+</button>
                </div>
                <input type="range" id="speedSlider" class="speed-slider" min="1" max="30" value="10" step="1">
            </div>
            
            <!-- Управление кружками -->
            <div class="control-group">
                <label>Количество кружков</label>
                <div class="circles-control">
                    <button class="circle-btn" id="removeCircle">−</button>
                    <span class="circle-count" id="circleCount">1</span>
                    <button class="circle-btn" id="addCircle">+</button>
                </div>
            </div>
            
            <!-- Тип клика -->
            <div class="control-group">
                <label>Тип клика</label>
                <div class="click-type">
                    <button class="type-btn active" data-type="single">Одиночный</button>
                    <button class="type-btn" data-type="double">Двойной</button>
                </div>
            </div>
            
            <!-- Кнопки управления -->
            <div class="action-buttons">
                <button class="action-btn start-btn" id="startBtn">
                    <span class="btn-icon">▶</span>
                    <span>Запустить</span>
                </button>
                <button class="action-btn stop-btn" id="stopBtn" disabled>
                    <span class="btn-icon">⏹</span>
                    <span>Стоп</span>
                </button>
            </div>
            
            <!-- Статистика -->
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Кликов:</span>
                    <span class="stat-value" id="clickCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Время:</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Контейнер для кружков -->
    <div class="circles-container" id="circlesContainer"></div>

    <!-- Кнопка быстрого доступа (когда меню скрыто) -->
    <button class="quick-access" id="quickAccess">⚡</button>

    <!-- Пасхалка -->
    <div class="easter-egg" id="easterEgg">⚡ Ваня - Декстер ⚡</div>

    <script src="script.js"></script>
</body>
</html>
